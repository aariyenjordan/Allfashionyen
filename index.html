<!DOCTYPE html>
<html>
<head>
<title>ALLFASHIONYEN</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}

/* Shutter */
.shutter{
  position:fixed;
  width:100%;
  height:50%;
  background:black;
  z-index:10;
}

.top{ top:0; animation:openTop 2s forwards; }
.bottom{ bottom:0; animation:openBottom 2s forwards; }

@keyframes openTop{
  to{transform:translateY(-100%);}
}
@keyframes openBottom{
  to{transform:translateY(100%);}
}

/* Name */
h1{
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  font-size:60px;
  color:#ff0000;
  opacity:0;
  animation:show 2s 2s forwards;
}

@keyframes show{
  to{opacity:1;}
}

/* Falcons */
.falcon{
  position:absolute;
  width:100px;
  opacity:0;
}

@keyframes fly{
  0%{left:-150px;opacity:1;}
  100%{left:110%;opacity:1;}
}
</style>
</head>

<body>

<div class="shutter top"></div>
<div class="shutter bottom"></div>

<h1>ALLFASHIONYEN</h1>

<!-- 12 Falcons -->
<script>
for(let i=0;i<12;i++){
  let f=document.createElement("img");
  f.src="https://upload.wikimedia.org/wikipedia/commons/3/32/Falcon_in_flight.jpg";
  f.className="falcon";
  f.style.top=(10+i*5)+"%";
  f.style.animation="fly 6s linear "+(2+i*0.2)+"s forwards";
  document.body.appendChild(f);
}
</script>

</body>
</html>
