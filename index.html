<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLFASHIONYEN</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

/* SHUTTER */
.top, .bottom{
  position:fixed;
  width:100%;
  height:50%;
  background:black;
  z-index:10;
}

.top{ top:0; animation:openTop 1.5s ease forwards; }
.bottom{ bottom:0; animation:openBottom 1.5s ease forwards; }

@keyframes openTop{
  to{transform:translateY(-100%);}
}
@keyframes openBottom{
  to{transform:translateY(100%);}
}

/* TEXT */
h1{
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  font-size:34px;
  color:red;
  opacity:0;
  animation:show 1s 1.5s forwards;
}

@keyframes show{
  to{opacity:1;}
}

/* FALCONS */
.falcon{
  position:absolute;
  width:70px;
  left:-100px;
}

/* FULL SCREEN FLY */
@keyframes flyFull{
  0%{
    left:-120px;
    transform:translateY(0) scale(0.9);
    opacity:0;
  }
  10%{
    opacity:1;
  }
  50%{
    transform:translateY(-20px) scale(1.1);
  }
  100%{
    left:110%;
    transform:translateY(0) scale(1);
    opacity:1;
  }
}
</style>

</head>

<body>

<div class="top"></div>
<div class="bottom"></div>

<h1>ALLFASHIONYEN</h1>

<script>
for(let i=0;i<10;i++){
  let f=document.createElement("img");

  f.src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Falcon_in_flight.jpg/320px-Falcon_in_flight.jpg";

  f.className="falcon";

  // spread vertically
  f.style.top=(5 + i*8) + "%";

  // smooth delay
  f.style.animation="flyFull 6s ease-in-out " + (1.5 + i*0.3) + "s forwards";

  document.body.appendChild(f);
}
</script>

</body>
</html>
