<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLFASHIONYEN</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

/* TEXT */
h1{
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  font-size:36px;
  color:#ff0000;
  letter-spacing:5px;
  text-shadow:0 0 10px red,0 0 30px red;
}

/* FALCON */
.falcon{
  position:absolute;
  width:80px;
  filter: drop-shadow(0 0 5px red);
}

/* REALISTIC FLY */
@keyframes flyReal{
  0%{
    left:-150px;
    transform:translateY(0) scale(0.8) rotate(0deg);
    opacity:0;
  }
  10%{opacity:1;}
  40%{
    transform:translateY(-20px) scale(1) rotate(5deg);
  }
  60%{
    transform:translateY(10px) scale(1.1) rotate(-5deg);
  }
  100%{
    left:110%;
    transform:translateY(0) scale(1);
    opacity:1;
  }
}
</style>
</head>

<body>

<h1>ALLFASHIONYEN</h1>

<script>
for(let i=0;i<10;i++){
  let f=document.createElement("img");

  // REAL FALCON PNG (working)
  f.src="https://pngimg.com/uploads/eagle/eagle_PNG1228.png";

  f.className="falcon";

  f.style.top=(5 + i*8) + "%";

  f.style.animation="flyReal 6s ease-in-out " + (i*0.4) + "s infinite";

  document.body.appendChild(f);
}
</script>

</body>
</html>
